# SafeON용 mosquitto 설정
# 실행: mosquitto -c mosquitto.conf -v
#   -v : 수신 토픽을 콘솔에 실시간 출력 (ESP32 발행 확인용, 대회장 디버깅에 유용)
#
# mosquitto 2.x는 기본이 localhost 전용이라 아래 두 줄이 없으면
# ESP32가 외부에서 접속하지 못함 — 반드시 이 설정 파일로 실행할 것.

# 모든 인터페이스에서 1883 포트 수신 (ESP32 접속 허용)
listener 1883
allow_anonymous true

# 연결 로그 (당일 태그 접속/끊김 추적)
connection_messages true
log_type error
log_type warning
log_type notice

# 불안정한 무선 환경 대비
max_keepalive 60
