<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeON 안전관제 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --safe:#3fb950; --caution:#d29922; --warning:#f0883e; --danger:#f85149; --accent:#58a6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI','Malgun Gothic',sans-serif; padding:20px; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  h1 { font-size:22px; } h1 span { color:var(--accent); }
  .conn { font-size:13px; color:var(--muted); }
  .conn.on::before { content:"● "; color:var(--safe); }
  .conn.off::before { content:"● "; color:var(--danger); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .panel h2 { font-size:15px; color:var(--muted); margin-bottom:12px; font-weight:600; }
  .full { grid-column:1 / -1; }
  /* 실시간 카드 */
  #cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  .card { border:1px solid var(--border); border-radius:8px; padding:14px; transition:border-color .2s; }
  .card .pair { font-size:13px; color:var(--muted); }
  .card .dist { font-size:30px; font-weight:700; margin:6px 0; }
  .card .meta { font-size:12px; color:var(--muted); }
  .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:700; color:#000; }
  .l0 { background:var(--safe);} .l1{ background:var(--caution);} .l2{ background:var(--warning);} .l3{ background:var(--danger); animation:blink 0.6s infinite;}
  .card.l3-border { border-color:var(--danger); box-shadow:0 0 12px rgba(248,81,73,.4); }
  .card.l2-border { border-color:var(--warning); }
  @keyframes blink { 50% { opacity:.4; } }
  .card.offline { opacity:.45; }
  /* 테이블 */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:7px 10px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; }
  tbody tr:hover { background:#1c2129; }
  #logWrap { max-height:320px; overflow-y:auto; }
  /* 리포트 */
  #reportSummary { line-height:1.7; font-size:14px; background:#1c2129; border-left:3px solid var(--accent); padding:12px 14px; border-radius:0 6px 6px 0; }
  .kpis { display:flex; gap:12px; margin-bottom:12px; }
  .kpi { flex:1; text-align:center; border:1px solid var(--border); border-radius:8px; padding:12px; }
  .kpi .num { font-size:26px; font-weight:700; }
  .kpi .lbl { font-size:12px; color:var(--muted); }
  canvas { max-height:220px; }
  .toolbar { display:flex; gap:8px; margin-bottom:10px; }
  select,button { background:#21262d; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<header>
  <h1>🦺 Safe<span>ON</span> 스마트 안전관제 대시보드</h1>
  <div id="conn" class="conn off">서버 연결 대기중…</div>
</header>

<div class="grid">
  <div class="panel full">
    <h2>실시간 관제 현황</h2>
    <div id="cards"><div style="color:var(--muted);font-size:13px">태그 데이터 수신 대기중…</div></div>
  </div>

  <div class="panel">
    <h2>Near-miss 이벤트 로그</h2>
    <div class="toolbar">
      <select id="fltLevel">
        <option value="">전체 등급</option>
        <option value="2">경고 이상</option>
        <option value="3">위험만</option>
      </select>
      <button onclick="loadEvents()">새로고침</button>
    </div>
    <div id="logWrap">
      <table>
        <thead><tr><th>시간</th><th>장비</th><th>작업자</th><th>거리(cm)</th><th>상태</th><th>등급</th></tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>일일 안전 리포트</h2>
    <div class="kpis">
      <div class="kpi"><div class="num" id="kpiTotal">0</div><div class="lbl">총 Near-miss</div></div>
      <div class="kpi"><div class="num" id="kpiWarn" style="color:var(--warning)">0</div><div class="lbl">경고</div></div>
      <div class="kpi"><div class="num" id="kpiDanger" style="color:var(--danger)">0</div><div class="lbl">위험</div></div>
    </div>
    <div id="reportSummary">데이터 수집 중…</div>
  </div>

  <div class="panel">
    <h2>시간대별 이벤트</h2>
    <canvas id="hourChart"></canvas>
  </div>

  <div class="panel">
    <h2>장비별 이벤트 순위</h2>
    <canvas id="equipChart"></canvas>
  </div>
</div>

<script>
const stateKo = { idle:"정지", forward:"전진", reverse:"후진", working:"작업중" };
const levelKo = ["안전","주의","경고","위험"];
const live = {};   // key -> 최신 데이터

// ---------- WebSocket ----------
let ws, wsTimer;
function connect() {
  ws = new WebSocket(`${location.protocol==="https:"?"wss":"ws"}://${location.host}/ws/live`);
  ws.onopen = () => { setConn(true); wsTimer = setInterval(()=>ws.send("ping"), 15000); };
  ws.onclose = () => { setConn(false); clearInterval(wsTimer); setTimeout(connect, 2000); };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type !== "live") return;
    live[`${d.equip_id}|${d.worker_id}`] = d;
    renderCards();
    if (d.event_recorded) { loadEvents(); loadReport(); }
  };
}
function setConn(on) {
  const el = document.getElementById("conn");
  el.className = "conn " + (on?"on":"off");
  el.textContent = on ? "서버 연결됨" : "연결 끊김 — 재연결 중…";
}

// ---------- 실시간 카드 ----------
function renderCards() {
  const now = Date.now()/1000;
  const el = document.getElementById("cards");
  el.innerHTML = Object.values(live).map(d => {
    const off = now - d.ts > 5;
    const border = d.risk_level>=3?"l3-border":d.risk_level>=2?"l2-border":"";
    return `<div class="card ${border} ${off?"offline":""}">
      <div class="pair">🚜 ${d.equip_id} ↔ 👷 ${d.worker_id} ${off?"(오프라인)":""}</div>
      <div class="dist">${d.distance_cm}<small style="font-size:14px;color:var(--muted)"> cm</small></div>
      <span class="badge l${d.risk_level}">${d.risk_label}</span>
      <div class="meta" style="margin-top:6px">
        상태: ${stateKo[d.equip_state]||d.equip_state} · 접근속도: ${d.speed_cms} cm/s
        ${d.battery!=null?` · 🔋${d.battery}%`:""}
      </div>
    </div>`;
  }).join("") || '<div style="color:var(--muted);font-size:13px">태그 데이터 수신 대기중…</div>';
}
setInterval(renderCards, 2000); // 오프라인 갱신용

// ---------- 이벤트 로그 ----------
async function loadEvents() {
  const lv = document.getElementById("fltLevel").value;
  const res = await fetch(`/api/events?limit=100${lv?`&min_level=${lv}`:""}`);
  const rows = await res.json();
  document.getElementById("logBody").innerHTML = rows.map(r => `<tr>
    <td>${r.ts.replace("T"," ")}</td><td>${r.equip_id}</td><td>${r.worker_id}</td>
    <td>${r.distance_cm}</td><td>${stateKo[r.equip_state]||r.equip_state}</td>
    <td><span class="badge l${r.risk_level}">${levelKo[r.risk_level]}</span></td>
  </tr>`).join("");
}
document.getElementById("fltLevel").onchange = loadEvents;

// ---------- 리포트 & 차트 ----------
let hourChart, equipChart;
async function loadReport() {
  const r = await (await fetch("/api/report/daily")).json();
  document.getElementById("kpiTotal").textContent = r.total;
  document.getElementById("kpiWarn").textContent = r.by_level["2"]||0;
  document.getElementById("kpiDanger").textContent = r.by_level["3"]||0;
  document.getElementById("reportSummary").textContent = r.summary;

  const hours = [...Array(24).keys()].map(h=>String(h).padStart(2,"0"));
  const hourData = hours.map(h=>r.by_hour[h]||0);
  if (!hourChart) {
    hourChart = new Chart(document.getElementById("hourChart"), {
      type:"bar",
      data:{ labels:hours.map(h=>h+"시"), datasets:[{ label:"이벤트 수", data:hourData, backgroundColor:"#58a6ff" }]},
      options:{ plugins:{legend:{display:false}}, scales:{ y:{ticks:{color:"#8b949e",precision:0},grid:{color:"#21262d"}}, x:{ticks:{color:"#8b949e"},grid:{display:false}} } }
    });
  } else { hourChart.data.datasets[0].data = hourData; hourChart.update(); }

  const eqLabels = r.by_equip.map(e=>e.equip_id), eqData = r.by_equip.map(e=>e.c);
  if (!equipChart) {
    equipChart = new Chart(document.getElementById("equipChart"), {
      type:"bar",
      data:{ labels:eqLabels, datasets:[{ label:"이벤트 수", data:eqData, backgroundColor:"#f0883e" }]},
      options:{ indexAxis:"y", plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:"#8b949e",precision:0},grid:{color:"#21262d"}}, y:{ticks:{color:"#8b949e"},grid:{display:false}} } }
    });
  } else { equipChart.data.labels = eqLabels; equipChart.data.datasets[0].data = eqData; equipChart.update(); }
}

connect();
loadEvents();
loadReport();
setInterval(loadReport, 10000);
</script>
</body>
</html>
